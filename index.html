    <!-- Google tag (gtag.js) Deferred -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DVYLWTWBSW');
      
      // Load gtag after initial paint
      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-DVYLWTWBSW';

    <!-- Preload LCP Images (Managed by Vite now) -->
  </head>
  <body>
    <div id="root">
      <!-- High Performance Inline Skeleton for FCP & LCP Optimization -->
      <style>
        .skeleton-wrap {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #0b0f19;
          color: #f3f4f6;
          font-family: system-ui, -apple-system, sans-serif;
          margin: 0;
          padding: 24px;
          text-align: center;
          box-sizing: border-box;
        }
        .skeleton-header {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 24px;
          animation: pulse-logo 1.8s infinite ease-in-out;
        }
        .skeleton-logo {
          height: 48px;
          width: auto;
          object-fit: contain;
        }
        .skeleton-heading {
          font-size: 1.8rem;
          font-weight: 800;
          color: #ffffff;
          margin: 0;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          line-height: 1;
        }
        .skeleton-text {
          font-size: 0.95rem;
          color: #9ca3af;
          margin: 0 0 32px 0;
          max-width: 480px;
          line-height: 1.5;
        }
        .skeleton-spinner {
          width: 32px;
          height: 32px;
          border: 3px solid rgba(255, 255, 255, 0.1);
          border-top: 3px solid #dc2626;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes pulse-logo {
          0%, 100% { transform: scale(1); opacity: 0.85; }
          50% { transform: scale(1.03); opacity: 1; }
        }
        @media (max-width: 640px) {
          .skeleton-heading { font-size: 1.4rem; }
          .skeleton-text { font-size: 0.85rem; }
          .skeleton-logo { height: 40px; }
        }
      </style>
      <div class="skeleton-wrap">
        <div class="skeleton-header">
          <img class="skeleton-logo" src="/src/assets/pasa-motor-logo.webp" alt="Paşa Motor Logo" width="100" height="40" />
          <h1 class="skeleton-heading"><span style="color:#dc2626">PAŞA</span> MOTOR</h1>
        </div>
        <div class="skeleton-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

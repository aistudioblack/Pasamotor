<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/src/assets/pasa-motor-logo.webp" />
    
    <!-- SEO & Meta Tags -->
    <title>Paşa Motor | Yedek Parça & Yetkili Servis</title>
    <meta name="description" content="Paşa Motor - Türkiye'nin en kapsamlı Kuba, Mondial, RKS yetkili servisi ve motosiklet yedek parça merkezi." />
    <meta name="keywords" content="Motosiklet yedek parça, Kuba motor servis, RKS yetkili servis, Mondial parça, Paşa Motor" />
    <meta name="author" content="Paşa Motor" />
    <link rel="canonical" href="https://pasamotor.com.tr" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pasamotor.com.tr/" />
    <meta property="og:title" content="Paşa Motor | Yedek Parça & Yetkili Servis" />
    <meta property="og:description" content="Motosiklet tutkunları için en kaliteli yedek parçalar ve yetkili motosiklet servisi. Güvenilir çözümler." />
    <meta property="og:site_name" content="Paşa Motor" />
    
    <!-- Geo Tags for Local SEO (Turkey) -->
    <meta name="geo.region" content="TR" />
    <meta name="geo.placename" content="Türkiye" />
    <meta name="language" content="Turkish" />
    
    <meta name="theme-color" content="#ffffff" />
    
    <!-- Preconnect & DNS Prefetch to domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- Optimized Google Fonts with font-display swap -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Russo+One&display=swap&subset=latin,latin-ext" rel="stylesheet" />
    
    <!-- Leaflet Map CSS via CDN (Deferred for performance) -->
    <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" media="print" onload="this.media='all'" crossorigin="" />
    <noscript><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" /></noscript>

    <!-- Google tag (gtag.js) Deferred -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DVYLWTWBSW');
      
      // Load gtag after initial paint
      window.addEventListener('load', function() {
        setTimeout(function() {
          var script = document.createElement('script');
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-DVYLWTWBSW';
          script.async = true;
          document.head.appendChild(script);
        }, 3000); // 3 second delay to ensure LCP and TBT are optimal
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
